<section class="hero-section">
  <div class="hero-copy">
    <p class="eyebrow">Big Data Lab</p>
    <h1>Explore real stock data like a statistician.</h1>
    <p>
      This dashboard uses thousands of daily prices from Amazon, Apple, Facebook, Google, and Netflix.
      Pick a date to compare one trading day, or explore the full time story below.
    </p>
  </div>
  <div class="date-panel">
    <span class="panel-label">Jump to a trading day</span>
    <mat-form-field appearance="outline">
      <mat-label>Choose a date</mat-label>
      <input matInput [matDatepicker]="picker" [formControl]="dateControl">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <a target="_blank" href="https://www.kaggle.com/aayushmishra1512/faang-complete-stock-data">Original dataset</a>
  </div>
</section>

<section class="visual-section">
  <app-scatter *ngIf="displayScatter"></app-scatter>
  <app-divergent-bar *ngIf="!displayScatter" [notify]="notify" (notFound)="onNotFound()"></app-divergent-bar>
</section>
