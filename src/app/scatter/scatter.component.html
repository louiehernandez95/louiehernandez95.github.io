<div class="lab-grid">
  <section class="chart-panel">
    <div class="panel-heading">
      <p class="eyebrow">Bubble Plot</p>
      <h2>Does heavier usually mean stronger?</h2>
    </div>
    <div id="pokemon-scatter"></div>
  </section>

  <section class="insight-panel">
    <p class="eyebrow">Data Detective Notes</p>
    <div class="insight" *ngFor="let insight of insights">
      <strong>{{ insight.title }}</strong>
      <span>{{ insight.body }}</span>
    </div>
  </section>

  <section class="chart-panel">
    <div class="panel-heading">
      <p class="eyebrow">Type Check</p>
      <h2>Which types show up the most?</h2>
    </div>
    <div id="type-bars"></div>
  </section>

  <section class="chart-panel">
    <div class="panel-heading">
      <p class="eyebrow">Speed Run</p>
      <h2>Average speed by type</h2>
    </div>
    <div id="speed-bars"></div>
  </section>
</div>
